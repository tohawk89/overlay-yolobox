<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay (Ceramah Agama)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue-masjid: #11429b;
            /* Solid Blue Logo background */
            --bar-top: #ffffff;
            /* White Subtitle background */
            --bar-bottom: #000000;
            /* Black Title background */
            --text-top: #000000;
            --text-bottom: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 100vw;
            height: 100vh;
            font-family: 'League Spartan', sans-serif;
        }

        #lower-third-container {
            position: absolute;
            bottom: 3.7vh;
            /* 40px / 1080px */
            left: 0;
            width: 100%;
            height: 14.8vh;
            /* 160px / 1080px */
            display: flex;
            opacity: 0;
            transform: translateY(150%);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #lower-third-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Logo Section */
        .logo-section {
            position: absolute;
            left: 0;
            bottom: 0;
            height: 14.8vh;
            width: 12.9vw;
            /* Narrowed: Solid (9.4vw) + Slant (3.5vw) */
            background: var(--blue-masjid);
            clip-path: polygon(0 0, 72.8% 0, 100% 100%, 0% 100%);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 2.1vw;
            /* 40px / 1920px */
            z-index: 10;
        }

        .logo-section img.brand-logo {
            width: 7.3vw;
            /* 140px / 1920px */
            height: 12vh;
            /* 130px / 1080px */
            object-fit: contain;
        }

        /* Bars Container */
        .bars-container {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 14.8vh;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Top Bar */
        .bar-top {
            background: var(--bar-top);
            height: 6vh;
            /* 65px / 1080px */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 11vw;
            /* Adjusted for tighter slant */
            padding-right: 8.3vw;
            /* Match QR width (160px/1920px) */
        }

        .subtitle {
            font-size: 1.93vw;
            /* 37px / 1920px */
            font-weight: 800;
            color: var(--text-top);
            margin: 0;
            letter-spacing: -0.05vw;
        }

        .qr-text {
            font-size: 1.46vw;
            /* 28px / 1920px */
            font-weight: 800;
            color: var(--text-top);
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .arrow {
            font-size: 1.46vw;
            /* 28px / 1920px */
            line-height: 1;
        }

        /* Bottom Bar */
        .bar-bottom {
            background: var(--bar-bottom);
            flex-grow: 1;
            display: flex;
            align-items: center;
            padding-left: 14vw;
            /* Adjusted for tighter slant */
            padding-right: 8.3vw;
        }

        .title {
            font-size: 1.93vw;
            /* 37px / 1920px */
            font-weight: 800;
            color: var(--text-bottom);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0px;
        }

        /* QR Section */
        .qr-section {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 14.8vh;
            width: 8.3vw;
            /* 160px / 1920px */
            background: var(--bar-top);
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.4vw;
        }

        .qr-placeholder {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-placeholder img.qr-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div id="lower-third-container">
        <!-- Blue Logo Section (left edge, slanted) -->
        <div class="logo-section">
            <img src="img/logo.png" alt="Mosque Logo" class="brand-logo" />
        </div>

        <!-- Right Side Bars Container -->
        <div class="bars-container">
            <!-- Top White Bar -->
            <div class="bar bar-top">
                <h2 class="subtitle" id="displayTitle">Kuliah Maghrib</h2>
                <div class="qr-text">Tabung Masjid <span class="arrow">➔</span></div>
            </div>
            <!-- Bottom Black Bar -->
            <div class="bar bar-bottom">
                <h1 class="title" id="displayName">Nama Penceramah</h1>
            </div>
        </div>

        <!-- Right-aligned QR Code Overlay -->
        <div class="qr-section">
            <div class="qr-placeholder">
                <img src="img/qr.jpeg" alt="QR Code Sumbangan" class="qr-image" />
            </div>
        </div>
    </div>

    <script src="./firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const app = initializeApp(window.firebaseConfig);
        const db = getDatabase(app);
        const overlayRef = ref(db, 'ceramah_overlay');

        onValue(overlayRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const container = document.getElementById('lower-third-container');
                const nameDisplay = document.getElementById('displayName');
                const titleDisplay = document.getElementById('displayTitle');

                nameDisplay.innerText = data.name;
                if (data.title) {
                    titleDisplay.innerText = data.title;
                }

                if (data.isVisible) {
                    container.classList.add('visible');
                } else {
                    container.classList.remove('visible');
                }
            }
        });
    </script>
</body>

</html>
