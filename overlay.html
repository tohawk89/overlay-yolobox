<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay (Ceramah Agama)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue-masjid: #11429b;
            /* Solid Blue Logo background */
            --bar-top: #ffffff;
            /* White Subtitle background */
            --bar-bottom: #000000;
            /* Black Title background */
            --text-top: #000000;
            --text-bottom: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 100vw;
            height: 100vh;
            font-family: 'League Spartan', sans-serif;
        }

        #lower-third-container {
            position: absolute;
            bottom: 3.7vh;
            /* 40px / 1080px */
            left: 0;
            width: 100%;
            height: 14.8vh;
            /* 160px / 1080px */
            display: flex;
            opacity: 0;
            transform: translateY(150%);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #lower-third-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Logo Section */
        .logo-section {
            position: absolute;
            left: 0;
            bottom: 0;
            height: 14.8vh;
            width: 12.9vw;
            /* Narrowed: Solid (9.4vw) + Slant (3.5vw) */
            background: var(--blue-masjid);
            clip-path: polygon(0 0, 65% 0, 100% 100%, 0% 100%);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 2.1vw;
            /* 40px / 1920px */
            z-index: 10;
        }

        .logo-section img.brand-logo {
            width: 7.3vw;
            /* 140px / 1920px */
            height: 12vh;
            /* 130px / 1080px */
            object-fit: contain;
        }

        /* Bars Container */
        .bars-container {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 14.8vh;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Top Bar */
        .bar-top {
            background: var(--bar-top);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 11vw;
            /* Adjusted for tighter slant */
            padding-right: 8.3vw;
            /* Match QR width (160px/1920px) */
        }

        .subtitle {
            font-size: 1.93vw;
            /* 37px / 1920px */
            font-weight: 800;
            color: var(--text-top);
            margin: 0;
            margin-left: 3vw;
            letter-spacing: -0.05vw;
        }

        .qr-text {
            font-size: 1.46vw;
            /* 28px / 1920px */
            font-weight: 800;
            color: var(--text-top);
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .arrow-img {
            width: 1.5vw;
            height: 1.5vw;
            display: inline-block;
            vertical-align: middle;
            object-fit: contain;
        }

        /* Bottom Bar */
        .bar-bottom {
            background: var(--bar-bottom);
            flex: 1;
            display: flex;
            align-items: center;
            padding-left: 15vw;
            /* Adjusted for tighter slant */
            padding-right: 8.3vw;
        }

        .title {
            font-size: 1.93vw;
            /* 37px / 1920px */
            font-weight: 800;
            color: var(--text-bottom);
            margin: 0;
            margin-left: 0.5vw;
            text-transform: uppercase;
        }

        /* QR Section */
        .qr-section {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 14.8vh;
            width: 8.3vw;
            /* 160px / 1920px */
            background: var(--bar-top);
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.4vw;
        }

        .qr-placeholder {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-placeholder img.qr-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div id="lower-third-container">
        <!-- Blue Logo Section (left edge, slanted) -->
        <div class="logo-section">
            <img src="img/logo.png" alt="Mosque Logo" class="brand-logo" />
        </div>

        <!-- Right Side Bars Container -->
        <div class="bars-container">
            <!-- Top White Bar -->
            <div class="bar-top">
                <h2 class="subtitle" id="displayTitle">Kuliah Maghrib</h2>
                <div class="qr-text">Tabung Masjid
                    <img src="img/arrow.jpg" alt="arrow" class="arrow-img" />
                </div>
            </div>
            <!-- Bottom Black Bar -->
            <div class="bar-bottom">
                <h1 class="title" id="displayName">Nama Penceramah</h1>
            </div>
        </div>

        <!-- Right-aligned QR Code Overlay -->
        <div class="qr-section">
            <div class="qr-placeholder">
                <img src="img/qr.jpeg" alt="QR Code Sumbangan" class="qr-image" />
            </div>
        </div>
    </div>

    <script src="./firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const app = initializeApp(window.firebaseConfig);
        const db = getDatabase(app);
        const overlayRef = ref(db, 'ceramah_overlay');
        const scheduleRef = ref(db, 'ceramah_schedule');

        let scheduleData = [];
        let manualOverlayState = { isVisible: true, name: '', title: '' };
        let lastActiveSessionKey = null;

        // Helper to parse DD/MM/YYYY and HH:MM:SS
        const parseDateTime = (d, t) => {
            if (!d || !t) return null;
            const [day, month, year] = d.split('/').map(Number);
            const [hour, min, sec] = t.split(':').map(Number);
            return new Date(year, month - 1, day, hour, min, sec);
        };

        function updateUI(name, title, isVisible) {
            const container = document.getElementById('lower-third-container');
            const nameDisplay = document.getElementById('displayName');
            const titleDisplay = document.getElementById('displayTitle');

            nameDisplay.innerText = name || '';
            if (title) titleDisplay.innerText = title;

            if (isVisible) {
                container.classList.add('visible');
            } else {
                container.classList.remove('visible');
            }
        }

        function checkAutomaticSchedule() {
            const now = new Date();
            let activeSession = null;

            if (Array.isArray(scheduleData)) {
                activeSession = scheduleData.find(item => {
                    const start = parseDateTime(item.startDate, item.startTime);
                    const end = parseDateTime(item.endDate, item.endTime);
                    return start && end && now >= start && now <= end;
                });
            }

            if (activeSession) {
                const sessionKey = `${activeSession.startDate}_${activeSession.startTime}`;

                if (sessionKey !== lastActiveSessionKey) {
                    // New session detected — write to Firebase to reset state and sync control panel
                    lastActiveSessionKey = sessionKey;
                    set(ref(db, 'ceramah_overlay'), {
                        title: activeSession.subject,
                        name: activeSession.description,
                        isVisible: true,
                        updatedAt: Date.now()
                    });
                    // Will re-trigger via onValue, so UI update handled there
                } else {
                    // Same session — ceramah_overlay is single source of truth (supports jump/override)
                    updateUI(manualOverlayState.name, manualOverlayState.title, manualOverlayState.isVisible);
                }
            } else {
                // No active session
                if (lastActiveSessionKey !== null) {
                    // Transition: session just ended — write isVisible: false to Firebase
                    lastActiveSessionKey = null;
                    set(ref(db, 'ceramah_overlay'), {
                        title: manualOverlayState.title,
                        name: manualOverlayState.name,
                        isVisible: false,
                        updatedAt: Date.now()
                    });
                    // Will re-trigger via onValue, UI update handled there
                } else {
                    // Gap with no prior session — Option B: respect isVisible (supports surprise/manual speakers)
                    updateUI(manualOverlayState.name, manualOverlayState.title, manualOverlayState.isVisible);
                }
            }
        }

        // Listen for overlay state changes (from control panel or self-writes)
        onValue(overlayRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                manualOverlayState = data;
                checkAutomaticSchedule();
            }
        });

        // Listen for Schedule Changes
        onValue(scheduleRef, (snapshot) => {
            scheduleData = snapshot.val() || [];
            checkAutomaticSchedule();
        });

        // Check every 10 seconds for session transitions (no Firebase calls, local only)
        setInterval(checkAutomaticSchedule, 10000);
    </script>
</body>

</html>
