<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparency Test</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* A colorful gradient background to clearly see transparency */
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            /* Or an actual test image / pattern */
            /* background-image: url('https://picsum.photos/1920/1080'); */
            /* background-size: cover; */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .test-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            z-index: 1;
        }

        .mock-video-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #3b82f6;
            z-index: 2;
            opacity: 0.5;
            /* mix with pattern */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-size: 5rem;
            color: white;
            font-weight: bold;
        }

        /* The actual YoloBox simulator */
        .yolobox-simulator {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            border: none;
            z-index: 10;
            /* Scale down slightly just to fit on smaller screens for this test */
            transform-origin: top left;
            transform: scale(min(100vw/1920, 100vh/1080));
        }
    </style>
</head>

<body>

    <!-- This represents the camera source / physical background in Yolobox -->
    <div class="test-pattern"></div>
    <div class="mock-video-bg">MOCK CAMERA STREAM</div>

    <!-- This is how Yolobox loads the URL: As an iframe over the video -->
    <iframe class="yolobox-simulator" src="./overlay.html" allowtransparency="true"></iframe>

</body>

</html>
